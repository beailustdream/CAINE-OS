<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <link
    rel="icon"
    type="image/png"
    href="/src/assets/images/caine.png"
  />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <meta
    name="theme-color"
    content="#0a0000"
  />

  <meta
    name="description"
    content="CAINE Digital Circus Operating System"
  />

  <!-- Fonts -->
  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  />

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  />

  <link
    href="
https://fonts.googleapis.com/css2?family=Creepster&family=Orbitron:wght@400;500;700&display=swap
"
    rel="stylesheet"
  />

  <title>
    CAINE OS
  </title>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body,
    #root {

      width: 100%;
      height: 100%;

      overflow: hidden;

      background: #050505;
    }

    body {

      font-family:
        'Orbitron',
        sans-serif;

      background:
        radial-gradient(
          circle at top,
          #2a0000,
          #050505
        );

      color: white;
    }

    /* Scrollbar */

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #0a0000;
    }

    ::-webkit-scrollbar-thumb {
      background: #550000;
      border-radius: 999px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #aa0000;
    }

  </style>

</head>

<body>

  <div id="root"></div>

  <script
    type="module"
    src="/src/main.jsx"
  ></script>

</body>
</html>
